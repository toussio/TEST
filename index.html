<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RAON 시즌 패스 데모</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand">
        <div class="logo">RAON</div>
        <div class="title">
          <h1>시즌 패스 (데모)</h1>
          <p>1~50레벨 / 일반 패스 + 골드 패스 / XP 추가로 레벨업 테스트</p>
        </div>
      </div>

      <div class="status">
        <div class="stat">
          <div class="label">레벨</div>
          <div class="value" id="uiLevel">1</div>
        </div>
        <div class="stat">
          <div class="label">경험치</div>
          <div class="value"><span id="uiXp">0</span> / <span id="uiNeed">100</span></div>
        </div>

        <div class="bar">
          <div class="barFill" id="uiBar"></div>
        </div>

        <div class="controls">
          <button class="btn" id="btnAddXp10">+10 XP</button>
          <button class="btn" id="btnAddXp50">+50 XP</button>
          <button class="btn" id="btnAddXp200">+200 XP</button>
          <button class="btn ghost" id="btnReset">리셋</button>

          <label class="toggle">
            <input type="checkbox" id="toggleGold" />
            <span>골드 패스 구매(테스트)</span>
          </label>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="pass">
        <div class="passHeader">
          <div class="badge free">일반 패스</div>
          <div class="hint">레벨 달성 시 보상 잠금 해제</div>
        </div>
        <div class="trackWrap">
          <div class="track" id="freeTrack"></div>
        </div>
      </section>

      <section class="pass gold">
        <div class="passHeader">
          <div class="badge gold">골드 패스</div>
          <div class="hint">구매 토글 ON + 레벨 달성 시 수령 가능</div>
        </div>
        <div class="trackWrap">
          <div class="track" id="goldTrack"></div>
        </div>
      </section>

      <section class="log">
        <div class="logHeader">
          <div class="badge">로그</div>
          <button class="btn ghost mini" id="btnClearLog">로그 지우기</button>
        </div>
        <div class="logBox" id="logBox"></div>
      </section>
    </main>

    <div class="toast" id="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
